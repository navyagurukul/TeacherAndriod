name: Teacher Android Automation CI

on:
  pull_request:
    branches: ["dev"]

  push:
    branches: ["main"]

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

jobs:

  # =========================================================
  # SMOKE TESTS
  # =========================================================
  smoke-tests:
    name: Smoke Tests
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APPIUM_PORT: 4723
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:

      # ================= CHECKOUT =================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Verify Python
        shell: powershell
        run: |
          python --version
          pip --version

      - name: Install Python Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ================= NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Verify Node
        shell: powershell
        run: |
          node -v
          npm -v

      # ================= APPIUM =================
      - name: Install Appium
        shell: powershell
        run: |
          npm install -g appium
          appium -v

      - name: Install UiAutomator2 Driver
        shell: powershell
        run: |
          appium driver install uiautomator2

      # ================= JAVA =================
      - name: Verify Java
        shell: powershell
        run: |
          java -version

      # ================= ANDROID DEVICE =================
      - name: Verify Android Device
        shell: powershell
        run: |
          adb devices

      # ================= KILL OLD APPIUM =================
      - name: Kill Existing Appium Server
        shell: powershell
        run: |
          $connections = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue

          if ($connections) {
            $pids = $connections | Select-Object -ExpandProperty OwningProcess -Unique

            foreach ($processId in $pids) {
              Stop-Process -Id $processId -Force
              Write-Host "Killed process using port 4723"
            }
          }
          else {
            Write-Host "No Appium process running"
          }

      # ================= START APPIUM =================
      - name: Start Appium Server
        shell: powershell
        run: |
          Start-Process powershell -ArgumentList "appium --address 127.0.0.1 --port 4723"
          Start-Sleep -Seconds 15

      # ================= VERIFY APPIUM =================
      - name: Verify Appium Server
        shell: powershell
        run: |
          Invoke-WebRequest http://127.0.0.1:4723/status

      # ================= RUN TESTS =================
      - name: Run Smoke Tests
        shell: powershell
        run: |
          pytest -m smoke -v -s --alluredir=allure-results

      # ================= ALLURE =================
      - name: Install Allure
        shell: powershell
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure Report
        shell: powershell
        run: |
          allure generate allure-results --clean -o allure-report

      # ================= REPORTS =================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-report
          path: allure-report

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/


  # =========================================================
  # REGRESSION TESTS
  # =========================================================
  regression-tests:
    name: Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APPIUM_PORT: 4723
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:

      # ================= CHECKOUT =================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Verify Python
        shell: powershell
        run: |
          python --version
          pip --version

      - name: Install Python Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ================= NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Verify Node
        shell: powershell
        run: |
          node -v
          npm -v

      # ================= APPIUM =================
      - name: Install Appium
        shell: powershell
        run: |
          npm install -g appium
          appium -v

      - name: Install UiAutomator2 Driver
        shell: powershell
        run: |
          appium driver install uiautomator2

      # ================= JAVA =================
      - name: Verify Java
        shell: powershell
        run: |
          java -version

      # ================= ANDROID DEVICE =================
      - name: Verify Android Device
        shell: powershell
        run: |
          adb devices

      # ================= KILL OLD APPIUM =================
      - name: Kill Existing Appium Server
        shell: powershell
        run: |
          $connections = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue

          if ($connections) {
            $pids = $connections | Select-Object -ExpandProperty OwningProcess -Unique

            foreach ($processId in $pids) {
              Stop-Process -Id $processId -Force
              Write-Host "Killed process using port 4723"
            }
          }
          else {
            Write-Host "No Appium process running"
          }

      # ================= START APPIUM =================
      - name: Start Appium Server
        shell: powershell
        run: |
          Start-Process powershell -ArgumentList "appium --address 127.0.0.1 --port 4723"
          Start-Sleep -Seconds 15

      # ================= VERIFY APPIUM =================
      - name: Verify Appium Server
        shell: powershell
        run: |
          Invoke-WebRequest http://127.0.0.1:4723/status

      # ================= RUN TESTS =================
      - name: Run Regression Tests
        shell: powershell
        run: |
          pytest -m regression -v -s --alluredir=allure-results

      # ================= ALLURE =================
      - name: Install Allure
        shell: powershell
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure Report
        shell: powershell
        run: |
          allure generate allure-results --clean -o allure-report

      # ================= REPORTS =================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-report
          path: allure-report

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots
          path: screenshots/
