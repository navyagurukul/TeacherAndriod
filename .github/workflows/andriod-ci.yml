name: Teacher Android Automation CI

on:
  pull_request:
    branches: ["dev"]

  push:
    branches: ["main", "dev"]

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

jobs:

  # ===================== SMOKE TESTS =====================
  smoke-tests:
    name: Smoke Tests
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity
      APPIUM_PORT: 4725

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # ================= NODE + APPIUM =================
      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install Appium
        run: |
          npm install -g appium
          appium -v

      # ================= JAVA =================
      - name: Verify Java
        run: |
          java -version

      # ================= VERIFY DEVICE =================
      - name: Verify Android Device
        run: |
          adb devices

      # ================= START APPIUM =================
      - name: Kill Existing Appium
        shell: cmd
        run: |
          taskkill /F /IM node.exe || exit /B 0

      - name: Start Appium Server
        shell: cmd
        run: |
          start /B appium -p %APPIUM_PORT%
          timeout /t 15

      # ================= RUN TESTS =================
      - name: Run Smoke Tests
        env:
          APPIUM_URL: http://127.0.0.1:4725
        run: |
          pytest -m smoke -v -s --alluredir=allure-results

      # ================= REPORT =================
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: allure-results

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/


  # ===================== REGRESSION TESTS =====================
  regression-tests:
    name: Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity
      APPIUM_PORT: 4725

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # ================= NODE + APPIUM =================
      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install Appium
        run: |
          npm install -g appium
          appium -v

      # ================= JAVA =================
      - name: Verify Java
        run: |
          java -version

      # ================= VERIFY DEVICE =================
      - name: Verify Android Device
        run: |
          adb devices

      # ================= START APPIUM =================
      - name: Kill Existing Appium
        shell: cmd
        run: |
          taskkill /F /IM node.exe || exit /B 0

      - name: Start Appium Server
        shell: cmd
        run: |
          start /B appium -p %APPIUM_PORT%
          timeout /t 15

      # ================= RUN TESTS =================
      - name: Run Regression Tests
        env:
          APPIUM_URL: http://127.0.0.1:4725
        run: |
          pytest -m regression -v -s --alluredir=allure-results

      # ================= REPORT =================
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: allure-results

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots
          path: screenshots/
