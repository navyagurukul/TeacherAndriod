name: Teacher Android Automation CI

on:
  pull_request:
    branches: ["dev"]

  push:
    branches: ["main", "dev"]

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

jobs:

  # =========================================================
  # SMOKE TESTS
  # =========================================================
  smoke-tests:
    name: Smoke Tests
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, windows]
    timeout-minutes: 90

    env:
      APPIUM_PORT: 4723
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:

      # ================= CHECKOUT =================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Test Python
        shell: powershell
        run: |
          python --version
          python -m pip --version

      - name: Install Python Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-rerunfailures

      # ================= NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
      
      - name: Verify Node
        shell: powershell
        run: |
          node -v
          npm -v

      # ================= APPIUM =================
      # Appium + UiAutomator2 should already be installed
      # on self-hosted runner
      - name: Verify Appium
        shell: powershell
        run: |
          appium -v
          appium driver list --installed

      # ================= JAVA =================
      - name: Verify Java
        shell: powershell
        run: |
          java -version

      # ================= ADB RESET =================
      - name: Restart ADB
        shell: powershell
        run: |
          adb kill-server
          Start-Sleep -Seconds 5
          adb start-server
          Start-Sleep -Seconds 10
          adb devices

      # ================= DEVICE =================
      - name: Wait For Device
        shell: powershell
        run: |
          adb wait-for-device
          Start-Sleep -Seconds 15
          adb shell getprop sys.boot_completed

      # ================= CLEAN REPORTS =================
      - name: Clean Reports
        shell: powershell
        run: |
          if (Test-Path allure-results) {
            Remove-Item allure-results -Recurse -Force
          }

          if (Test-Path allure-report) {
            Remove-Item allure-report -Recurse -Force
          }

      # ================= KILL OLD APPIUM =================
      - name: Kill Existing Appium
        shell: powershell
        run: |
          $connections = Get-NetTCPConnection -LocalPort 4723 -ErrorAction SilentlyContinue

          if ($connections) {
            $pids = $connections | Select-Object -ExpandProperty OwningProcess -Unique

            foreach ($processId in $pids) {
              Stop-Process -Id $processId -Force -ErrorAction SilentlyContinue
            }
          }

      # ================= START APPIUM =================
      - name: Start Appium Server
        shell: powershell
        run: |
          Start-Process cmd.exe -ArgumentList "/c appium --address 127.0.0.1 --port 4723 > appium.log 2>&1"

      # ================= WAIT FOR APPIUM =================
      - name: Verify Appium Server
        shell: powershell
        run: |
          netstat -ano | findstr 4723
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:4723/status"
            Write-Host "Appium Server Running"
            $response
          }
          catch {
            Write-Host "Appium Server Failed"
            Get-Content appium.log
            exit 1
          }

      # ================= RUN TESTS =================
      - name: Run Smoke Tests
        shell: powershell
        run: |
          pytest -m smoke -v -s --alluredir=allure-results

      # ================= ALLURE =================
      - name: Install Allure
        shell: powershell
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure Report
        shell: powershell
        run: |
          allure generate allure-results --clean -o allure-report

      # ================= REPORTS =================
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-report
          path: allure-report

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/

      # ================= CLEANUP =================
      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Get-Process node -ErrorAction SilentlyContinue | Stop-Process -Force
          adb kill-server



  # =========================================================
  # REGRESSION TESTS
  # =========================================================
  regression-tests:
    name: Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, windows]
