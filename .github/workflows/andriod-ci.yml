name: Teacher Android Automation CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - dev

  schedule:
    - cron: "0 2 * * *"   # Nightly regression run

  workflow_dispatch:

jobs:

  # ================= CLOUD CHECKS =================
  cloud-checks:
    name: Cloud Validation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Tests
        run: |
          pytest --collect-only


  # ================= SMOKE TESTS =================
  smoke-tests:
    name: Smoke Tests
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ================= NODE + APPIUM =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Appium
        run: |
          npm install -g appium
          appium -v

      # ================= JAVA =================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ================= START APPIUM =================
      - name: Start Appium Server
        shell: cmd
        run: |
          start /B appium
          timeout /t 15

      # ================= RUN TESTS =================
      - name: Run Smoke Tests
        run: |
          pytest -m smoke -v -s --alluredir=allure-results

      # ================= REPORTS =================
      - name: Upload Smoke Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: allure-results

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/


  # ================= REGRESSION TESTS =================
  regression-tests:
    name: Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Windows]

    env:
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ================= NODE + APPIUM =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Appium
        run: |
          npm install -g appium
          appium -v

      # ================= JAVA =================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ================= START APPIUM =================
      - name: Start Appium Server
        shell: cmd
        run: |
          start /B appium
          timeout /t 15

      # ================= RUN TESTS =================
      - name: Run Regression Tests
        run: |
          pytest -m regression -v -s --alluredir=allure-results

      # ================= REPORTS =================
      - name: Upload Regression Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: allure-results

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots
          path: screenshots/
