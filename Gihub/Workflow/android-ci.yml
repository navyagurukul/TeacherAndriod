name: Teacher Android Automation CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["dev"]
  schedule:
    - cron: "0 2 * * *"   # nightly regression run

jobs:
  android-tests:
    name: Android Appium Tests
    runs-on: ubuntu-latest

    env:
      APP_PACKAGE: com.OritSciencesPrivateLimited.EnglishGurukul.teacher
      APP_ACTIVITY: com.OritSciencesPrivateLimited.EnglishGurukul.MainActivity

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ================= NODE + APPIUM =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Appium
        run: |
          npm install -g appium
          appium -v

      # ================= JAVA =================
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ================= START APPIUM =================
      - name: Start Appium server
        run: |
          appium --log-level info &
          sleep 15
          
  # ================= SMOKE =================
  smoke-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Node + Appium
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install -g appium

      - name: Start Appium
        run: appium & sleep 15

      - name: Run Smoke Tests
        run: pytest -m smoke --alluredir=allure-results

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: allure-results


  # ================= REGRESSION =================
  regression-tests:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node + Appium
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install -g appium

      - name: Start Appium
        run: appium & sleep 15

      - name: Run Regression Tests
        run: pytest -m regression --alluredir=allure-results

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: allure-results

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/